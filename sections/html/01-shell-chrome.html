<!-- Área principal: topbar, contexto y vista de panel activo. -->
<div id="main">
  <div id="topbar" class="stitch-topbar">

    <div class="tb-heading" hidden>
      <div class="tb-title" id="tbt">Inicio</div>
      <div class="tb-sub" id="tbs">Bienvenido a AulaBase</div>
    </div>

    <!-- Controles superiores alineados al layout estilo Stitch. -->
    <div class="tb-stitch-left">
      <div class="tb-stitch-search">
        <span class="material-symbols-outlined stitch-search-icon">search</span>
        <input type="text" placeholder="Search..." aria-label="Search" readonly>
      </div>
    </div>

    <div id="tb-context"></div>
    <div id="tb-actions"></div>

    <div class="tb-stitch-right">
      <button class="tb-icon-btn" type="button" aria-label="Notificaciones">
        <span class="material-symbols-outlined">notifications</span>
      </button>
      <button class="tb-icon-btn" type="button" aria-label="Ayuda">
        <span class="material-symbols-outlined">help</span>
      </button>

      <div class="top-profile stitch-profile-group" id="top-profile">
        <button class="top-profile-toggle stitch-profile-pill" id="top-profile-toggle" type="button" aria-label="Abrir menú de perfil" aria-expanded="false">
          <span class="top-profile-inline stitch-profile-text">
            <span class="stitch-profile-name" id="top-inline-name">Sin perfil</span>
            <span class="stitch-profile-role" id="top-inline-role">SIN SESIÓN</span>
          </span>
          <img class="top-user-av stitch-avatar" src="https://ui-avatars.com/api/?name=User&background=1E293B&color=fff&size=40" alt="Avatar" id="sb-av-img">
          <span id="sb-av" style="display:none;">?</span>
        </button>
        
        <div class="stitch-profile-dropdown" id="top-profile-menu" hidden>
          <div class="stitch-pd-header">
             <img src="https://ui-avatars.com/api/?name=User&background=1E293B&color=fff&size=48" class="stitch-pd-avatar" id="sb-pd-av-img" alt="Avatar">
             <div class="stitch-pd-info">
                 <div class="stitch-pd-name" id="sb-name">Sin perfil</div>
                 <div class="stitch-pd-email" id="sb-email">sin.correo@aulabase.edu</div>
             </div>
          </div>
          <div class="stitch-pd-divider"></div>
          <div class="stitch-pd-actions">
              <button class="stitch-pd-item" id="sb-profile-open" type="button">
                  <span class="material-symbols-outlined">person</span> Mi Perfil
              </button>
              <button class="stitch-pd-item stitch-pd-active" id="sb-config-open" type="button">
                  <span class="material-symbols-outlined">settings</span> Configuración
              </button>
              <button class="stitch-pd-item" type="button">
                  <span class="material-symbols-outlined">help</span> Ayuda
              </button>
          </div>
          <div class="stitch-pd-divider"></div>
          <div class="stitch-pd-footer">
              <button class="stitch-pd-item stitch-pd-danger" id="sb-logout" type="button" onclick="logoutAuth()" style="display:none;">
                  <span class="material-symbols-outlined">logout</span> Cerrar sesión
              </button>
              <button class="stitch-pd-item stitch-pd-danger" id="sb-logout-compact" type="button" onclick="logoutAuth()" style="display:none;" hidden>Cerrar sesión</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id="view"></div>
</div>

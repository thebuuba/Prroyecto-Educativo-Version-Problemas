<!-- Shell visual del acceso: marca, tarjeta principal y contenedor de los modos login/registro. -->
<div class="ov" id="m-auth">
  <div class="auth-shell">
    <div class="auth-brand" aria-hidden="true">
      <div class="auth-brand-stage">
        <div class="auth-brand-watermark">
          <img class="auth-brand-logo" src="/assets/logo-aulabase.svg" alt="" width="72" height="72" decoding="async" fetchpriority="high">
          <div class="auth-brand-copy">
            <h1 class="auth-brand-name">AulaBase</h1>
            <p class="auth-brand-kicker">EL LIENZO ESTRUCTURADO</p>
          </div>
        </div>
      </div>
    </div>

    <div class="modal modal-auth">
      <div class="mh auth-head">
        <div class="auth-head-copy">
          <h2 class="mt" id="auth-title">Bienvenido de nuevo</h2>
          <p class="auth-subtitle" id="auth-subtitle">Ingresa tus credenciales para continuar.</p>
        </div>
      </div>
      <div class="mb auth-panel" data-mode="login">
        <div class="auth-note" id="auth-note" hidden>
          <div class="auth-note-body">
            <div class="auth-note-title" id="auth-note-title"></div>
            <div class="auth-note-text" id="auth-note-text"></div>
          </div>
        </div>

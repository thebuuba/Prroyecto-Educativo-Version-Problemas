<!-- Editar Estudiante -->
<div class="ov" id="m-est-edit">
  <div class="modal modal-est">
    <div class="mh"><div class="mt">Editar Estudiante</div><button class="mx" data-action="modal-close" data-modal-close="m-est-edit">&times;</button></div>
    <div class="mb">
      <input type="hidden" id="ee-id">
      <div class="student-photo-editor">
        <div class="student-photo-preview-wrap">
          <img class="student-photo-preview" id="ee-photo-preview" alt="Foto del estudiante">
        </div>
        <div class="student-photo-editor-fields">
          <input type="hidden" id="ee-photo-data">
          <div class="fg">
            <label class="lbl">Foto de perfil</label>
            <input class="inp" id="ee-photo-file" type="file" accept="image/*" data-student-action="import" data-student-import="photo-legacy" data-student-prefix="ee">
            <div class="form-note">Puedes actualizar la foto del estudiante en cualquier momento.</div>
          </div>
          <button class="btn btn-outline btn-sm" type="button" data-student-action="clear-filter" data-student-clear="photo" data-student-prefix="ee">Quitar foto</button>
        </div>
      </div>
      <div class="fr">
        <div class="fg"><label class="lbl">Nombre</label><input class="inp" id="ee-nom" placeholder="Nombre(s)"></div>
        <div class="fg"><label class="lbl">Apellido</label><input class="inp" id="ee-ape" placeholder="Apellido(s)"></div>
      </div>
      <div class="fr">
        <div class="fg"><label class="lbl">Matr&iacute;cula</label><input class="inp" id="ee-mat" placeholder="00-0000-0" inputmode="numeric" maxlength="9" autocomplete="off"></div>
        <div class="fg"><label class="lbl">Secci&oacute;n</label><select class="sel" id="ee-sec"></select></div>
      </div>
      <div class="mf">
        <button class="btn btn-outline" data-action="modal-close" data-modal-close="m-est-edit">Cancelar</button>
        <button class="btn btn-primary" data-student-action="save" data-student-mode="edit">Guardar cambios</button>
      </div>
    </div>
  </div>
</div>

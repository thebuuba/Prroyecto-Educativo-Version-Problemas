<!-- Formulario de registro: datos de cuenta, validaciones y acceso social alterno. -->
        <div id="auth-register-box" class="auth-form-box" style="display:none;">
            <div class="auth-register-login-line">
              <span>¿Ya tienes una cuenta?</span>
              <button class="auth-inline-link auth-register-login-link" type="button" onclick="setAuthMode('login')">Inicia sesión</button>
            </div>
            <div class="fg">
              <label class="lbl">Nombre completo</label>
              <div class="auth-input-wrap">
                <span class="auth-input-icon material-symbols-outlined" aria-hidden="true">person</span>
                <input class="inp" id="ar-name" placeholder="Ej. Alexauris D&iacute;az">
              </div>
              <div class="auth-field-error" id="ar-name-error" hidden></div>
            </div>
            <div class="fg">
              <label class="lbl">Correo electrónico</label>
              <div class="auth-input-wrap">
                <span class="auth-input-icon material-symbols-outlined" aria-hidden="true">mail</span>
                <input class="inp" id="ar-email" type="email" placeholder="correo@centro.edu">
              </div>
              <div class="auth-field-error" id="ar-email-error" hidden></div>
            </div>
            <div class="fg">
              <label class="lbl">Contraseña</label>
              <div class="auth-input-wrap">
                <span class="auth-input-icon material-symbols-outlined" aria-hidden="true">lock</span>
                <input class="inp password-input" id="ar-pass" type="password" placeholder="M&iacute;nimo 8 caracteres">
                <button class="password-toggle" type="button" onclick="togglePasswordVisibility('ar-pass', this)" aria-label="Mostrar contraseña" title="Mostrar contraseña">
                  <span class="material-symbols-outlined" aria-hidden="true">visibility</span>
                </button>
              </div>
              <div class="auth-pass-strength" id="ar-pass-strength" hidden>
                <div class="auth-pass-strength-head">
                  <span>Seguridad de contraseña</span>
                  <strong id="ar-pass-strength-label">Débil</strong>
                </div>
                <div class="auth-pass-strength-track">
                  <div class="auth-pass-strength-fill" id="ar-pass-strength-fill"></div>
                </div>
              </div>
              <div class="auth-field-error" id="ar-pass-error" hidden></div>
            </div>
            <div class="fg">
              <label class="lbl">Confirmar contraseña</label>
              <div class="auth-input-wrap">
                <span class="auth-input-icon material-symbols-outlined" aria-hidden="true">lock_reset</span>
                <input class="inp password-input" id="ar-pass2" type="password" placeholder="Repite la contraseña">
                <button class="password-toggle" type="button" onclick="togglePasswordVisibility('ar-pass2', this)" aria-label="Mostrar contraseña" title="Mostrar contraseña">
                  <span class="material-symbols-outlined" aria-hidden="true">visibility</span>
                </button>
              </div>
              <div class="auth-field-error" id="ar-pass2-error" hidden></div>
            </div>
            <div class="auth-terms-row">
              <label class="auth-terms-check" for="ar-terms-check">
                <input id="ar-terms-check" type="checkbox">
                <span>Acepto los <a href="/terminos.html" target="_blank" rel="noopener noreferrer">t&eacute;rminos y condiciones</a>.</span>
              </label>
            </div>
            <div class="auth-field-error" id="ar-terms-error" hidden></div>
            <button class="btn btn-primary btn-lg auth-submit-btn" id="auth-register-submit" type="button" onclick="registerAuth()">Crear cuenta <span class="material-symbols-outlined" aria-hidden="true">arrow_forward</span></button>
            <div class="auth-register-social">
              <div class="auth-social-divider">o regístrate con</div>
              <div class="auth-social-actions">
                <button class="btn btn-outline auth-social-btn" type="button" onclick="authWithProvider('google')" aria-label="Google" title="Google">
                  <span class="auth-social-mark auth-social-mark-google" aria-hidden="true">
                    <img src="/assets/icons/google.png" alt="" width="18" height="18" decoding="async" loading="lazy">
                  </span>
                  <span>Google</span>
                </button>
                <button class="btn btn-outline auth-social-btn" type="button" onclick="authWithProvider('facebook')" aria-label="Facebook" title="Facebook">
                  <span class="auth-social-mark auth-social-mark-facebook" aria-hidden="true">
                    <img src="/assets/icons/facebook.png" alt="" width="18" height="18" decoding="async" loading="lazy">
                  </span>
                  <span>Facebook</span>
                </button>
                <button class="btn btn-outline auth-social-btn" type="button" onclick="authWithProvider('github')" aria-label="GitHub" title="GitHub">
                  <span class="auth-social-mark auth-social-mark-github" aria-hidden="true">
                    <svg viewBox="0 0 24 24" width="20" height="20" focusable="false">
                      <path fill="currentColor" d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.52 11.52 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
                    </svg>
                  </span>
                  <span>GitHub</span>
                </button>
              </div>
            </div>
        </div>

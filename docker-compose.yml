services:
  postgres:
    image: postgres:16-alpine
    container_name: aulabase-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aulabase
      POSTGRES_USER: aulabase
      POSTGRES_PASSWORD: aulabase_dev
    ports:
      - "5432:5432"
    volumes:
      - aulabase_postgres_data:/var/lib/postgresql/data

volumes:
  aulabase_postgres_data:

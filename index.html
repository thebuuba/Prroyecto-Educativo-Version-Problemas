<script>
  (function redirectWrongOAuthHostEarly() {
    var params = new URLSearchParams(window.location.search || '');
    var isOAuthCallback = params.has('code') || params.has('state') || params.has('error') || params.has('error_description');
    var host = String(window.location.hostname || '').toLowerCase();
    var isLocalHost = host === 'localhost' || host === '127.0.0.1' || host === '::1';
    if (!isOAuthCallback || !isLocalHost) return;

    var target = 'https://aula-base.vercel.app/inicio' + (window.location.search || '') + (window.location.hash || '');
    window.location.replace(target);
  })();
</script>

<script>
  (function initBootFallback() {
    const BOOT_TIMEOUT_MS = 3500;
    document.documentElement.classList.add('auth-session-checking');

    function hideBootSplash(reason) {
      const splash = document.getElementById('app-boot');
      if (!splash || splash.dataset.bootHidden === '1') return;
      splash.dataset.bootHidden = '1';
      splash.classList.add('is-hidden');
      window.setTimeout(() => splash.remove(), 280);
      if (reason && window.console && typeof window.console.warn === 'function') {
        window.console.warn('[AulaBase][boot] splash cerrado por fallback:', reason);
      }
    }

    if (window.__aulaBaseBootFallbackInstalled) return;
    window.__aulaBaseBootFallbackInstalled = true;

    window.addEventListener('error', (event) => {
      const message = event?.error?.message || event?.message || 'error no controlado';
      // Ignorar advertencias transitorias de navegación o de carga de módulos en modo dev (Vite)
      if (message.includes('import statement') || message.includes('Unexpected token') || message.includes('module')) {
        if (window.console && window.console.debug) {
          window.console.debug('[AulaBase][boot] Error de parseo ignorado en fallback:', message);
        }
        return;
      }
      hideBootSplash(message);
    });

    window.addEventListener('unhandledrejection', (event) => {
      const message = event?.reason?.message || event?.reason || 'rechazo no controlado';
      hideBootSplash(message);
    });

    window.setTimeout(() => hideBootSplash('timeout inicial'), BOOT_TIMEOUT_MS);
  })();
</script>

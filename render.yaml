services:
  - type: web
    name: aulabase-sql-api
    runtime: node
    buildCommand: "cd server && npm install"
    # Execute migrations before starting application
    startCommand: "cd server && npm run migrate && npm run start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: aulabase-postgres-db
          property: connectionString
      - key: DATABASE_SSL
        value: "true"

databases:
  - name: aulabase-postgres-db
    databaseName: aulabase
    user: aulabase

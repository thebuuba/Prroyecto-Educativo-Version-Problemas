<!-- Selector rápido de tipo de instrumento para crear uno nuevo desde cero. -->
<div class="ov" id="m-inst-type">
  <div class="modal">
    <div class="mh"><div class="mt">Nuevo instrumento básico</div><button class="mx" data-action="modal-close" data-modal-close="m-inst-type">&times;</button></div>
    <div class="mb">
      <div style="font-size:12px;color:var(--mute);margin-bottom:10px;">Selecciona un tipo para crear el instrumento:</div>
      <div id="inst-type-grid" class="tpl-grid"></div>
      <div class="mf">
        <button class="btn btn-outline" data-action="modal-close" data-modal-close="m-inst-type">Cancelar</button>
      </div>
    </div>
  </div>
</div>

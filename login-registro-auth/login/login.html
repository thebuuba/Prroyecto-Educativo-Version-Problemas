<!-- Formulario de inicio de sesión: proveedores sociales, correo y acceso persistente. -->
        <div id="auth-login-box" class="auth-form-box">
            <div class="auth-login-register-line">
              <span>¿No tienes una cuenta?</span>
              <button class="auth-inline-link auth-login-register-link" type="button" onclick="setAuthMode('register')">Regístrate</button>
            </div>
            <div class="fg">
              <label class="lbl">Correo electrónico</label>
              <div class="auth-input-wrap">
                <span class="auth-input-icon material-symbols-outlined" aria-hidden="true">mail</span>
                <input class="inp" id="al-email" type="email" placeholder="Correo institucional o personal">
              </div>
            </div>
            <div class="fg">
              <div class="auth-password-head">
                <label class="lbl">Contraseña</label>
                <button class="auth-inline-link" type="button" onclick="handleForgotPassword()">¿Olvidaste tu contraseña?</button>
              </div>
              <div class="auth-input-wrap">
                <span class="auth-input-icon material-symbols-outlined" aria-hidden="true">lock</span>
                <input class="inp password-input" id="al-pass" type="password" placeholder="Contraseña">
                <button class="password-toggle" type="button" onclick="togglePasswordVisibility('al-pass', this)" aria-label="Mostrar contraseña" title="Mostrar contraseña">
                  <span class="material-symbols-outlined" aria-hidden="true">visibility</span>
                </button>
              </div>
            </div>
            <div class="auth-remember-row">
              <input class="auth-remember-check" id="remember" type="checkbox">
              <label class="auth-remember-label" for="remember">Mantener sesión iniciada</label>
            </div>
            <button class="btn btn-primary btn-lg auth-submit-btn" type="button" onclick="loginAuth()">Iniciar sesión</button>
            <div class="auth-social">
              <div class="auth-social-divider" id="auth-social-divider">o continúa con</div>
              <div class="auth-social-actions">
                <button class="btn btn-outline auth-social-btn" type="button" onclick="authWithProvider('google')" aria-label="Google" title="Google">
                  <span class="auth-social-mark auth-social-mark-google" aria-hidden="true">
                    <img src="/assets/icons/google.png" alt="" width="18" height="18" decoding="async" loading="lazy">
                  </span>
                  <span>Google</span>
                </button>
                <button class="btn btn-outline auth-social-btn" type="button" onclick="authWithProvider('facebook')" aria-label="Facebook" title="Facebook">
                  <span class="auth-social-mark auth-social-mark-facebook" aria-hidden="true"></span>
                  <span>Facebook</span>
                </button>
              </div>
            </div>
        </div>

<!-- Editar Secci&oacute;n -->
<div class="ov" id="m-sec-edit">
  <div class="modal">
    <div class="mh"><div class="mt">Editar Sección</div><button class="mx" data-action="modal-close" data-modal-close="m-sec-edit">&times;</button></div>
    <div class="mb">
      <input type="hidden" id="es-id">
      <div class="fr">
        <div class="fg"><label class="lbl">Grado</label><select class="sel" id="es-gid" onchange="refreshSectionCurriculumForm('es', true)"></select></div>
        <div class="fg"><label class="lbl">Secci&oacute;n</label><input class="inp" id="es-sec" placeholder="A"></div>
      </div>
      <div class="fg">
        <label class="lbl">Área</label>
        <div class="field-inline-actions">
          <select class="sel" id="es-area" onchange="refreshSectionCurriculumForm('es', true)"></select>
          <button class="btn btn-outline btn-sm" type="button" onclick="createSectionCustomArea('es')">+ Área</button>
        </div>
      </div>
      <div class="fg">
        <label class="lbl">Asignatura base</label>
        <div class="field-inline-actions">
          <select class="sel" id="es-mat"></select>
          <button class="btn btn-outline btn-sm" type="button" onclick="createSectionCustomSubject('es')">+ Asignatura</button>
        </div>
      </div>
      <div class="fg"><label class="lbl">Aula por defecto (opcional)</label><input class="inp" id="es-room" placeholder="Ej. Aula 3A"></div>
      <div class="mf">
        <button class="btn btn-outline" data-action="modal-close" data-modal-close="m-sec-edit">Cancelar</button>
        <button class="btn btn-primary" onclick="saveEditSection()">Guardar cambios</button>
      </div>
    </div>
  </div>
</div>

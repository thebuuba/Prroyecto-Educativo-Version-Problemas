<!-- Modal de estudiante: alta manual, foto, matrícula y selección de sección. -->
<div class="ov" id="m-est">
  <div class="modal modal-est">
    <div class="mh"><div class="mt">Nuevo Estudiante</div><button class="mx" onclick="closeM('m-est')">&times;</button></div>
    <div class="mb">
      <div class="student-photo-editor">
        <div class="student-photo-preview-wrap">
          <img class="student-photo-preview" id="e-photo-preview" alt="Foto del estudiante">
        </div>
        <div class="student-photo-editor-fields">
          <input type="hidden" id="e-photo-data">
          <div class="fg">
            <label class="lbl">Foto de perfil</label>
            <input class="inp" id="e-photo-file" type="file" accept="image/*" onchange="handleStudentPhotoInput(this, 'e')">
            <div class="form-note">Sube una foto clara del estudiante. Formatos recomendados: JPG o PNG.</div>
          </div>
          <button class="btn btn-outline btn-sm" type="button" onclick="clearStudentPhotoField('e')">Quitar foto</button>
        </div>
      </div>
      <div class="fg">
        <label class="lbl">Estudiante guardado</label>
        <input class="inp" id="e-remembered" list="e-remembered-list" placeholder="Busca por nombre o matricula" autocomplete="off" oninput="applyRememberedStudentSelection(this.value)">
        <datalist id="e-remembered-list"></datalist>
        <div class="form-note">Si ya lo registraste antes, lo eliges aqui y sus datos se completan solos.</div>
      </div>
      <div class="fr">
        <div class="fg"><label class="lbl">Nombre</label><input class="inp" id="e-nom" placeholder="Nombre(s)"></div>
        <div class="fg"><label class="lbl">Apellido</label><input class="inp" id="e-ape" placeholder="Apellido(s)"></div>
      </div>
      <div class="fr">
        <div class="fg"><label class="lbl">Matr&iacute;cula</label><input class="inp" id="e-mat" placeholder="00-0000-0" inputmode="numeric" maxlength="9" autocomplete="off"></div>
        <div class="fg"><label class="lbl">Secci&oacute;n</label><select class="sel" id="e-sec"></select></div>
      </div>
      <div class="mf mf-split">
        <button class="btn btn-outline" onclick="openBulkFromEstModal()">Carga masiva</button>
        <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;">
          <button class="btn btn-outline" onclick="closeM('m-est')">Cancelar</button>
          <button class="btn btn-outline" onclick="saveEst({keepOpen:true})">Registrar y nuevo estudiante</button>
          <button class="btn btn-primary" onclick="saveEst()">Registrar</button>
        </div>
      </div>
    </div>
  </div>
</div>
